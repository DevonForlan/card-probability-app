<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Card Probability Assistant</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css?v=8" />
</head>
<body>
  <div id="app">

    <nav class="tabs" aria-label="game tabs">
      <button class="tab active" data-tab="ten">十點半</button>
      <button class="tab" data-tab="dragon">射龍門</button>
      <button class="tab" data-tab="deck">紀錄</button>
    </nav>

    <main>
      <!-- 十點半 -->
      <section class="panel active" id="tenPanel">
        <div class="compact-header">
          <div>
            <h2>十點半</h2>
            <p>A=1，J/Q/K=0.5，已扣除已出牌</p>
          </div>
          <button class="outline-btn" id="tenNewRound">新一局</button>
        </div>

        <div class="mode-switch">
          <button class="mode active" data-ten-mode="hand">我的手牌</button>
          <button class="mode" data-ten-mode="table">檯面已出牌</button>
        </div>

        <div class="result-grid">
          <div class="result primary">
            <span>目前點數</span>
            <strong id="tenTotal">0.0</strong>
          </div>
          <div class="result">
            <span>安全</span>
            <strong id="safeProb">--</strong>
          </div>
          <div class="result">
            <span>爆牌</span>
            <strong id="bustProb">--</strong>
          </div>
          <div class="result">
            <span>剛好 10.5</span>
            <strong id="exactProb">--</strong>
          </div>
        </div>

        <div class="rank-grid" id="tenRanks"></div>

        <div class="mini-status">
          <div>
            <span>我的手牌</span>
            <strong id="tenHandText">尚未加入</strong>
          </div>
          <div>
            <span>檯面已出牌</span>
            <strong id="tenTableText">尚未記錄</strong>
          </div>
        </div>

        <div class="recommendation compact" id="tenRecommendation">請先輸入手牌。</div>

        <details class="advanced">
          <summary>牌副與牌堆設定</summary>
          <div class="advanced-grid">
            <label>
              <span>十點半牌副數</span>
              <select id="tenDeckSelect" class="select">
                <option value="1">1 副</option>
                <option value="2">2 副</option>
                <option value="3">3 副</option>
                <option value="4">4 副</option>
                <option value="6">6 副</option>
                <option value="8">8 副</option>
              </select>
            </label>
            <div class="deck-mini">
              <span>剩餘</span>
              <strong id="tenRemainingCards">52</strong>
            </div>
            <div class="deck-mini">
              <span>已出現</span>
              <strong id="tenSeenCards">0</strong>
            </div>
          </div>
        </details>
      </section>

      <!-- 射龍門 -->
      <section class="panel" id="dragonPanel">
        <div class="compact-header">
          <div>
            <h2>射龍門</h2>
            <p>A 最小，撞上柱贏三倍，撞下柱輸兩倍</p>
          </div>
          <button class="outline-btn" id="dragonNewRound">新一局</button>
        </div>

        <div class="mode-switch">
          <button class="mode active" data-dragon-mode="round">本局牌</button>
          <button class="mode" data-dragon-mode="table">檯面已出牌</button>
        </div>

        <div class="same-controls" id="sameControls">
          <button class="choice active" data-guess="high">猜大</button>
          <button class="choice" data-guess="low">猜小</button>
        </div>

        <div class="result-grid">
          <div class="result primary">
            <span id="dragonMainLabel">進門</span>
            <strong id="dragonWinProb">--</strong>
          </div>
          <div class="result">
            <span id="dragonUpperLabel">撞上柱</span>
            <strong id="dragonUpperProb">--</strong>
          </div>
          <div class="result">
            <span id="dragonLowerLabel">撞下柱</span>
            <strong id="dragonLowerProb">--</strong>
          </div>
          <div class="result">
            <span id="dragonLoseLabel">出門</span>
            <strong id="dragonLoseProb">--</strong>
          </div>
        </div>

        <div class="rank-grid" id="dragonRanks"></div>

        <div class="mini-status">
          <div>
            <span>本局牌</span>
            <strong id="dragonCardsText">請輸入前兩張</strong>
          </div>
          <div>
            <span>檯面已出牌</span>
            <strong id="dragonTableText">尚未記錄</strong>
          </div>
        </div>

        <div class="recommendation compact" id="dragonBreakdown">輸入兩張牌後開始計算。</div>

        <details class="advanced">
          <summary>牌副與牌堆設定</summary>
          <div class="advanced-grid">
            <label>
              <span>射龍門牌副數</span>
              <select id="dragonDeckSelect" class="select">
                <option value="1">1 副</option>
                <option value="2">2 副</option>
                <option value="3">3 副</option>
                <option value="4">4 副</option>
                <option value="6">6 副</option>
                <option value="8">8 副</option>
              </select>
            </label>
            <div class="deck-mini">
              <span>剩餘</span>
              <strong id="dragonRemainingCards">104</strong>
            </div>
            <div class="deck-mini">
              <span>已出現</span>
              <strong id="dragonSeenCards">0</strong>
            </div>
          </div>
        </details>
      </section>

      <!-- 紀錄 -->
      <section class="panel" id="deckPanel">
        <div class="compact-header">
          <div>
            <h2>紀錄</h2>
            <p>最近點牌與剩餘牌堆摘要</p>
          </div>
        </div>

        <div class="deck-actions">
          <button class="outline-btn" id="undoBtn">回上一張</button>
          <button class="danger-btn" id="shuffleBtn">重洗目前遊戲牌堆</button>
        </div>

        <div class="remaining-table" id="remainingTable"></div>

        <div class="history">
          <div class="label">最近紀錄</div>
          <div id="historyList">尚無紀錄</div>
        </div>
      </section>
    </main>

    <footer class="footer-actions">
      <button class="outline-btn" id="globalUndo">回上一張</button>
      <button class="danger-btn" id="globalShuffle">重洗牌</button>
    </footer>
  </div>

  <script src="app.js?v=7"></script>
</body>
</html>
